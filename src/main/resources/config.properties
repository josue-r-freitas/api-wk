# URL base da API WK Radar (obrigatório). Ex.: https://api.exemplo.wk.com.br
api.base.url=

# Bearer token para autenticação (obrigatório). Nunca commitar valor real.
api.auth.token=

# Timeout em milissegundos para conexão e leitura HTTP (opcional, default 30000)
api.timeout.ms=30000

# Diretório de saída dos arquivos Excel (aplicação cria se não existir)
output.dir=./output

# --- Filtros da API GET /api/comercial/v1/nota-fiscal (todos opcionais) ---
# Datas no formato yyyy-MM-dd
filtro.data.emissao.inicial=
filtro.data.emissao.final=

# Número inicial e final da NF (inteiros)
filtro.numero.inicial=
filtro.numero.final=

# ID da filial
filtro.id.filial=

# IDs separados por vírgula (ex.: id1,id2)
filtro.ids=
filtro.codigos.integrador=

# Campos retornados (Data Shaping), separados por vírgula. Ex.: id,numero,chave,dataEmissao
filtro.fields=
